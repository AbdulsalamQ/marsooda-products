  * { margin:0; padding:0; box-sizing:border-box; }
  :root{ --bg:#f7f2ee; --card:#fffdfb; --ink:#2c2420; --muted:#8a7a6f; --soft:#a3958a;
    --gold:#b98a5e; --line:#efe4da; --accent:#c0542f; }
  body{ font-family:'Tajawal',sans-serif; color:var(--ink); background:var(--bg); }
  .wrap{ direction:rtl; padding:44px clamp(18px,5vw,64px) 90px; max-width:1500px; margin:0 auto; background:var(--bg); min-height:100vh; }
  .head{ display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:30px; flex-wrap:wrap; gap:20px; }
  .kicker{ font-size:13px; letter-spacing:.3em; color:var(--gold); font-weight:700; margin-bottom:10px; }
  h1{ font-family:'Playfair Display',serif; font-size:clamp(32px,5vw,46px); color:var(--ink); font-weight:600; text-wrap:balance; }
  .sub{ margin-top:10px; color:var(--muted); font-size:16px; }
  .count-pill{ color:var(--gold); font-weight:700; }
  .controls{ display:flex; gap:14px; align-items:center; flex-wrap:wrap; margin-bottom:30px; }
  .search{ position:relative; flex:1; min-width:240px; max-width:420px; }
  .search input{ width:100%; font-family:'Tajawal'; font-size:15px; padding:13px 46px 13px 18px; border-radius:999px;
    border:1px solid var(--line); background:#fff; color:var(--ink); outline:none; transition:border .2s, box-shadow .2s; }
  .search input:focus{ border-color:var(--gold); box-shadow:0 0 0 4px rgba(185,138,94,.12); }
  .search svg{ position:absolute; right:16px; top:50%; transform:translateY(-50%); opacity:.5; }
  .fav-toggle{ border:1px solid var(--line); background:#fff; color:#6b5d54; padding:12px 20px; border-radius:999px;
    font-family:'Tajawal'; font-size:14px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:8px; transition:all .2s; }
  .fav-toggle.on{ background:#2c2420; color:var(--bg); border-color:#2c2420; }
  .fav-toggle:hover{ opacity:.9; }
  .cat-dd{ position:relative; }
  .dd-btn{ border:1px solid var(--line); background:#fff; color:#6b5d54; padding:12px 18px; border-radius:999px;
    font-family:'Tajawal'; font-size:14px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:8px; transition:all .2s; }
  .dd-btn:hover{ opacity:.9; }
  .cat-dd.open .dd-btn{ border-color:var(--gold); box-shadow:0 0 0 4px rgba(185,138,94,.12); }
  .dd-btn .chev{ transition:transform .2s; opacity:.6; }
  .cat-dd.open .dd-btn .chev{ transform:rotate(180deg); }

<script>
(function(){
  const DATA = JSON.parse(document.getElementById('DATA').textContent);
  const PRODUCTS = DATA.products, CATS = DATA.categories;
  document.getElementById('total').textContent = DATA.total.toLocaleString('ar-EG');
  const TINTS = ['#f3e6da','#f1dde2','#eae3d6','#f0e2d2','#e8ded0','#f3e9de','#e9dde3','#e6ded3','#f2e9df','#eee4d5'];
  const ACCENTS = ['#c0542f','#a34b5a','#8a7a4f','#b98a5e','#7a6a3f','#c9974f','#8a4f5f','#6f5a3f','#b98a5e','#8a7a4f'];
  const slugList = [...new Set(PRODUCTS.map(p=>p.slug))];
  function tintFor(p){ const i=slugList.indexOf(p.slug); return {bg:TINTS[i%TINTS.length], accent:ACCENTS[i%ACCENTS.length]}; }
  const FAV_KEY='marsooda_favs';
  let favs={}; try{ favs=JSON.parse(localStorage.getItem(FAV_KEY)||'{}'); }catch(e){ favs={}; }
  function saveFavs(){ try{ localStorage.setItem(FAV_KEY, JSON.stringify(favs)); }catch(e){} }
  let activeCat='الكل', favOnly=false, query='';
  function esc(s){ return (s||'').replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
  function escAttr(s){ return (s||'').replace(/[&<>"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
  function filtered(){
    const q=query.trim().toLowerCase();
    return PRODUCTS.filter(p=>{
      if(favOnly && !favs[p.asin]) return false;
      if(activeCat!=='الكل' && p.cat!==activeCat) return false;
      if(q){ const hay=(p.name+' '+p.nameEn+' '+p.brand+' '+p.asin+' '+p.short).toLowerCase(); if(!hay.includes(q)) return false; }
      return true;
    });
  }
  const grid=document.getElementById('grid'), sentinel=document.getElementById('sentinel');
  let current=[], shown=0; const PAGE=40;
  function cardHTML(p, idx){
    const t=tintFor(p), fav=!!favs[p.asin];
    const priceHTML=(p.price!=null && p.price!=='')
      ? `<div class="price"><b>${Number(p.price).toLocaleString('ar-EG',{maximumFractionDigits:2})}</b><small>${esc(p.cur)}</small></div>`
      : `<div class="price"><span class="na">السعر غير متوفر</span></div>`;
    const badge='';
    const rating=(p.rating!=null)?`<div class="rating"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3 6.5 7 .6-5.3 4.6 1.6 6.9L12 17.3 5.7 20.6l1.6-6.9L2 9.1l7-.6z"/></svg>${Number(p.rating).toLocaleString('ar-EG',{minimumFractionDigits:1,maximumFractionDigits:1})}${p.reviews?`<span class="rc">(${Number(p.reviews).toLocaleString('ar-EG')})</span>`:''}</div>`:'';
    const imgTag = p.img
      ? `<img loading="lazy" src="${p.img}" alt="${escAttr(p.name)}" onload="if(this.naturalWidth>2){this.previousElementSibling.style.display='none'}else{this.style.display='none'}" onerror="this.style.display='none'">`
      : '';
    return `<div class="card" style="animation-delay:${(idx%PAGE)*0.03}s">
      <div class="imgwrap">
        <div class="ph" style="color:${t.accent};background:${t.bg}">صورة المنتج<span>${esc(p.short||p.brand||p.asin)}</span></div>
        ${imgTag}
        ${badge}
        ${rating}
        <button class="fav-btn" data-asin="${escAttr(p.asin)}" title="أضف للمفضلة" aria-label="أضف للمفضلة">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="${fav?'#c0542f':'none'}" stroke="${fav?'#c0542f':'#a3958a'}" stroke-width="2"><path d="M12 21s-7.5-4.9-10-9.3C.3 8 1.7 4 5.4 3.1 8 2.5 10.4 3.7 12 6.2 13.6 3.7 16 2.5 18.6 3.1 22.3 4 23.7 8 22 11.7 19.5 16.1 12 21 12 21z"/></svg>
        </button>
      </div>
      <div class="body">
        <div class="brand">${esc(p.brand||p.cat)}</div>
        <div class="name">${esc(p.name)}</div>
        <div class="asin">${esc(p.asin)}</div>
        <div class="foot">${priceHTML}<a class="amz" href="${escAttr(p.url)}" target="_blank" rel="noopener">أمازون ↗</a></div>
      </div>
    </div>`;
  }
  function rerender(){
    current=filtered(); shown=0; grid.innerHTML='';
    if(current.length===0){ grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><h3>لا توجد منتجات مطابقة</h3><p>جرّب تعديل البحث أو اختيار قسم آخر.</p></div>`; return; }
    appendMore();
  }
  function appendMore(){
    const next=current.slice(shown, shown+PAGE); if(next.length===0) return;
    grid.insertAdjacentHTML('beforeend', next.map((p,i)=>cardHTML(p, shown+i)).join('')); shown+=next.length;
  }
  new IntersectionObserver(es=>{ if(es[0].isIntersecting) appendMore(); }, {rootMargin:'600px'}).observe(sentinel);
  const catDD=document.getElementById('catDD'), catBtn=document.getElementById('catBtn'),
        catPanel=document.getElementById('catPanel'), catLabel=document.getElementById('catLabel');
  function renderCatPanel(){
    const all=[{name:'كل التصنيفات', count:PRODUCTS.length, key:'الكل'}].concat(CATS.map(c=>({name:c.name, count:c.count, key:c.name})));
    catPanel.innerHTML=all.map(c=>`<button class="dd-item${activeCat===c.key?' active':''}" data-cat="${escAttr(c.key)}"><span>${esc(c.name)}</span><span class="n">${c.count}</span></button>`).join('');
    catLabel.textContent = activeCat==='الكل' ? 'كل التصنيفات' : activeCat;
  }
  function closeDD(){ catDD.classList.remove('open'); catBtn.setAttribute('aria-expanded','false'); }
  catBtn.addEventListener('click', e=>{ e.stopPropagation(); const o=catDD.classList.toggle('open'); catBtn.setAttribute('aria-expanded', o?'true':'false'); });
  catPanel.addEventListener('click', e=>{ const b=e.target.closest('.dd-item'); if(!b) return; activeCat=b.dataset.cat; renderCatPanel(); closeDD(); rerender(); });
  document.addEventListener('click', e=>{ if(!catDD.contains(e.target)) closeDD(); });
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeDD(); });
  grid.addEventListener('click', e=>{
    const b=e.target.closest('.fav-btn'); if(!b) return;
    const a=b.dataset.asin; favs[a]=!favs[a]; saveFavs();
    const on=favs[a], svg=b.querySelector('svg');
    svg.setAttribute('fill', on?'#c0542f':'none'); svg.setAttribute('stroke', on?'#c0542f':'#a3958a');
    if(favOnly && !on){ const c=b.closest('.card'); c&&c.remove(); }
  });
  let qt; document.getElementById('q').addEventListener('input', e=>{ query=e.target.value; clearTimeout(qt); qt=setTimeout(rerender,160); });
  const favBtn=document.getElementById('favToggle');
  favBtn.addEventListener('click', ()=>{ favOnly=!favOnly; favBtn.classList.toggle('on', favOnly); rerender(); });
  renderCatPanel(); rerender();
})();
</script>
